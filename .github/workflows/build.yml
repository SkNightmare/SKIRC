  update-release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: build/

      - name: Get target release (prerelease first)
        id: get_release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            let latest = releases.data.find(r => r.prerelease);
            if (!latest) {
              latest = releases.data.find(r => !r.prerelease);
            }

            if (!latest) {
              core.setFailed("No release or prerelease found. Create at least one manually.");
              return;
            }

            core.setOutput("release_id", latest.id);

      - name: Delete old assets
        uses: actions/github-script@v7
        with:
          script: |
            const release_id = ${{ steps.get_release.outputs.release_id }};
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id
            });

            for (const asset of assets.data) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id
              });
            }

      - name: Upload new assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
