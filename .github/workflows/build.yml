name: Build + Update Latest Release

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri (Windows)
        run: npx tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src-tauri/target/release/bundle/

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Java (Android)
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk

      - name: Build Android APK (NON FONCTIONNEL)
        run: |
          echo "APK NON FONCTIONNEL - BUILD EXPERIMENTAL" > WARNING.txt
          npx tauri android build || echo "Android build failed but continuing"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-NON-FONCTIONNEL
          path: |
            src-tauri/gen/android/app/build/outputs/
            WARNING.txt

  update-release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: build/

      - name: Get latest release tag
        id: get_release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            if (releases.data.length === 0) {
              core.setFailed("No release or prerelease found. Create at least one manually with a tag.");
              return;
            }

            // Trier par date de publication décroissante
            releases.data.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            const latest = releases.data[0];
            console.log(`Latest release tag: ${latest.tag_name}`);
            core.setOutput("release_tag", latest.tag_name);

      - name: Delete old assets from latest release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ steps.get_release.outputs.release_tag }}'
            });

            const release_id = release.data.id;

            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id
            });

            for (const asset of assets.data) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id
              });
            }

      - name: Upload new assets to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_release.outputs.release_tag }}
          files: build/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
